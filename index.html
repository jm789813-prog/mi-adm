<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Admin - Login</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-600 to-purple-700 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-2xl p-8 animate-fadeIn">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-blue-600 mb-2">Mi Admin</h1>
                <p class="text-gray-600 text-sm">Gestor Personal Inteligente</p>
            </div>

            <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                    <input 
                        id="user" 
                        type="text" 
                        placeholder="admin"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input 
                        id="pass" 
                        type="password" 
                        placeholder="••••••"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>

                <div id="msg" class="hidden p-3 rounded-lg text-sm font-medium"></div>

                <button 
                    type="submit" 
                    class="w-full py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold rounded-lg hover:shadow-lg transform hover:scale-105 transition"
                >
                    Entrar
                </button>
            </form>

            <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200 text-xs text-gray-600">
                <p class="font-bold mb-2">Demo:</p>
                <p>👤 Usuario: <code>admin</code></p>
                <p>🔑 Contraseña: <code>1234</code></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
