<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendientes - Mi Admin</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-gradient-to-r from-orange-600 to-red-600 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">✅ Pendientes</h1>
            <a href="dashboard.html" class="bg-gray-500 hover:bg-gray-600 px-4 py-2 rounded-lg font-semibold">Atrás</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex gap-2 mb-6">
                <input 
                    id="t"
                    type="text"
                    placeholder="Nueva tarea..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                    onkeypress="if(event.key==='Enter') add()"
                >
                <button 
                    onclick="add()"
                    class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg font-semibold transition"
                >
                    ➕ Agregar
                </button>
            </div>

            <ul id="list" class="space-y-2"></ul>
        </div>
    </main>

    <script>
        let data=JSON.parse(localStorage.getItem('pen'))||[];
        
        function add(){
            let v=document.getElementById('t').value.trim();
            if(v==='') return;
            data.push({texto:v, completado:false});
            localStorage.setItem('pen',JSON.stringify(data));
            document.getElementById('t').value='';
            render();
        }

        function toggleTask(index){
            data[index].completado=!data[index].completado;
            localStorage.setItem('pen',JSON.stringify(data));
            render();
        }

        function deleteTask(index){
            data.splice(index,1);
            localStorage.setItem('pen',JSON.stringify(data));
            render();
        }

        function render(){
            document.getElementById('list').innerHTML=data.map((x,i)=>
                `<li class="bg-orange-50 p-3 rounded-lg flex justify-between items-center ${x.completado?'opacity-60 line-through':''}">
                    <div class="flex items-center gap-3">
                        <input 
                            type="checkbox" 
                            ${x.completado?'checked':''} 
                            onchange="toggleTask(${i})"
                            class="w-5 h-5 text-orange-600 rounded"
                        >
                        <span>${x.texto}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-sm">❌</button>
                </li>`
            ).join('');
        }
        render();
    </script>
</body>
</html>
