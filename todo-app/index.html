<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do List</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-indigo-600 mb-2">📝 My To-Do List</h1>
            <p class="text-gray-600">Organize your tasks efficiently</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Input Section -->
            <div class="bg-gradient-to-r from-indigo-600 to-blue-600 p-6">
                <div class="flex gap-3">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="Add a new task..."
                        class="flex-1 px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        onkeypress="if(event.key==='Enter') addTask()"
                    >
                    <select id="prioritySelect" class="px-4 py-3 rounded-lg focus:outline-none">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button 
                        onclick="addTask()" 
                        class="bg-white text-indigo-600 px-6 py-3 rounded-lg font-semibold hover:bg-indigo-50 transition transform hover:scale-105"
                    >
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="bg-gray-50 p-4 flex gap-2 flex-wrap border-b border-gray-200">
                <button onclick="filterTasks('all')" class="filter-btn active" data-filter="all">
                    All
                </button>
                <button onclick="filterTasks('active')" class="filter-btn" data-filter="active">
                    Active
                </button>
                <button onclick="filterTasks('completed')" class="filter-btn" data-filter="completed">
                    Completed
                </button>
                <button onclick="filterTasks('high')" class="filter-btn" data-filter="high">
                    🔴 High Priority
                </button>
                <div class="ml-auto flex gap-2">
                    <button onclick="exportTasks()" class="text-blue-600 hover:text-blue-800 px-3 py-1 text-sm font-medium">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button onclick="clearCompleted()" class="text-red-600 hover:text-red-800 px-3 py-1 text-sm font-medium">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-4 grid grid-cols-3 gap-4 border-b border-gray-200">
                <div class="text-center">
                    <p class="text-2xl font-bold text-indigo-600" id="totalCount">0</p>
                    <p class="text-sm text-gray-600">Total Tasks</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-blue-600" id="activeCount">0</p>
                    <p class="text-sm text-gray-600">Active</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-green-600" id="completedCount">0</p>
                    <p class="text-sm text-gray-600">Completed</p>
                </div>
            </div>

            <!-- Tasks List -->
            <div id="tasksList" class="p-6 space-y-3 max-h-96 overflow-y-auto">
                <!-- Tasks will be inserted here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="p-12 text-center">
                <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                <p class="text-xl text-gray-400">No tasks yet. Start by adding one!</p>
            </div>
        </div>

        <!-- Quick Tips -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="font-bold text-indigo-600 mb-2">💡 Tip 1</h3>
                <p class="text-sm text-gray-600">Use priority levels to organize important tasks</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="font-bold text-indigo-600 mb-2">💡 Tip 2</h3>
                <p class="text-sm text-gray-600">All your tasks are automatically saved locally</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="font-bold text-indigo-600 mb-2">💡 Tip 3</h3>
                <p class="text-sm text-gray-600">Export your tasks as JSON for backup</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
